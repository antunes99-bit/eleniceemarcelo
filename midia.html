<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Na mídia — Elenice & Marcelo Dança de Salão</title>
<meta name="description" content="Publicações e matérias sobre a escola de dança de salão Elenice & Marcelo, em Pelotas/RS.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Elenice & Marcelo — Dança de Salão">
<meta property="og:title" content="Na mídia — Elenice & Marcelo Dança de Salão">
<meta property="og:description" content="Publicações e matérias sobre a escola de dança de salão Elenice & Marcelo, em Pelotas/RS.">
<meta property="og:url" content="https://eleniceemarcelo.com.br/midia.html">
<meta property="og:image" content="https://eleniceemarcelo.com.br/uploads/Fotocard%20Sambapel.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://eleniceemarcelo.com.br/uploads/Fotocard%20Sambapel.jpg">
<link id="favicon" rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root{--wine:#6e1d2c;--wine-dark:#511320;--gold:#c79a4b;--gold-soft:#e3c98a;--cream:#faf5ee;--cream-2:#f3e9db;--ink:#2a1c1f;--muted:#7a6a63;--shadow:0 18px 50px -20px rgba(46,16,24,.45);--radius:18px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--cream);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px;width:100%}
  header{background:rgba(250,245,238,.95);border-bottom:1px solid var(--cream-2);position:sticky;top:0;z-index:10}
  nav{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:1140px;margin:0 auto;padding:0 22px}
  .brand{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:1.32rem;color:var(--wine);display:flex;align-items:center;gap:.7rem}
  .brand span{color:var(--gold)}
  .brand img{height:52px;width:52px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--gold)}
  .back{font-weight:600;color:var(--wine);font-size:.92rem;padding:.5rem 1.1rem;border:1.5px solid var(--cream-2);border-radius:999px;transition:.2s}
  .back:hover{background:var(--wine);color:#fff;border-color:var(--wine)}
  .hero{background:linear-gradient(135deg,var(--wine-dark),var(--wine) 60%,#7e2535);color:#fff;padding:64px 0 56px;text-align:center}
  .eyebrow{letter-spacing:.22em;text-transform:uppercase;font-size:.72rem;font-weight:700;color:var(--gold-soft)}
  .hero h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(2.2rem,5vw,3.2rem);margin:.5rem 0 .6rem}
  .hero p{color:rgba(255,255,255,.9);max-width:560px;margin:0 auto;font-size:1.08rem}
  main{flex:1;padding:54px 0 70px}
  .list{display:flex;flex-direction:column;gap:18px}
  .pub{display:flex;gap:18px;align-items:flex-start;background:#fff;border-radius:var(--radius);padding:24px 26px;box-shadow:var(--shadow);border-left:4px solid var(--gold);transition:.2s}
  .pub:hover{transform:translateY(-3px)}
  .pub .ico{flex:0 0 46px;height:46px;border-radius:50%;background:var(--wine);display:flex;align-items:center;justify-content:center;color:var(--gold-soft);font-size:1.2rem}
  .pub h3{font-family:'Playfair Display',Georgia,serif;color:var(--wine);font-size:1.2rem;line-height:1.3}
  .pub .veiculo{display:block;color:var(--gold);font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;margin-top:.3rem}
  .pub .go{display:inline-block;margin-top:.7rem;color:var(--wine);font-weight:700;font-size:.9rem;border-bottom:2px solid var(--gold);padding-bottom:1px}
  .empty{text-align:center;color:var(--muted);font-style:italic;padding:50px 10px}
  footer{background:var(--wine-dark);color:rgba(255,255,255,.8);text-align:center;padding:34px 0;font-size:.85rem}
  footer .gold{color:var(--gold-soft)}
  @media(max-width:600px){.pub{flex-direction:column;gap:10px}}
</style>
</head>
<body>
<header>
  <nav>
    <a href="index.html" class="brand" id="brand">Elenice <span>&amp;</span> Marcelo</a>
    <a href="index.html" class="back">← Voltar ao site</a>
  </nav>
</header>

<section class="hero">
  <div class="wrap">
    <div class="eyebrow">Imprensa & publicações</div>
    <h1>Na mídia</h1>
    <p>Matérias e publicações que falaram sobre o nosso trabalho com a dança de salão.</p>
  </div>
</section>

<main>
  <div class="wrap">
    <div class="list" id="list"><div class="empty">Carregando publicações…</div></div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div><strong class="gold">Elenice &amp; Marcelo</strong> · Dança de Salão · Pelotas/RS</div>
  </div>
</footer>

<script>
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
async function getJSON(p,f){try{const r=await fetch(p,{cache:'no-cache'});return await r.json();}catch(e){return f;}}
async function load(){
  const info=await getJSON('content/info.json',{});
  if(info.logo){
    document.getElementById('brand').innerHTML='<img src="'+info.logo+'" alt="Elenice & Marcelo"><span style="font-family:\'Playfair Display\',Georgia,serif;color:var(--wine)">Elenice <em style="color:var(--gold);font-style:normal">&amp;</em> Marcelo</span>';
    document.getElementById('favicon').href=info.logo;
  }
  const m=await getJSON('content/midia.json',{itens:[]});
  const itens=((m&&m.itens)||[]).slice().reverse();
  const box=document.getElementById('list');
  if(!itens.length){box.innerHTML='<div class="empty">Em breve, as publicações sobre a escola aparecerão aqui.</div>';return;}
  box.innerHTML=itens.map(it=>
    '<a class="pub" href="'+it.link+'" target="_blank" rel="noopener"><div class="ico">📰</div><div><h3>'+esc(it.titulo)+'</h3>'+
    (it.veiculo?'<span class="veiculo">'+esc(it.veiculo)+'</span>':'')+'<span class="go">Ler a matéria ↗</span></div></a>'
  ).join('');
}
load();
</script>
</body>
</html>
