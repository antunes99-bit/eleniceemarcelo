# Configuração do painel de edição (Pages CMS) — app.pagescms.org
media:
  input: uploads
  output: /uploads
  categories: [image, audio, video]

content:
  - name: galeria
    label: "Galeria — O salão em movimento"
    type: file
    path: content/gallery.json
    fields:
      - name: itens
        label: Fotos
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{legenda}"
        fields:
          - name: imagem
            label: "Foto ou vídeo (.mp4)"
            type: file
          - name: legenda
            label: Legenda
            type: string
          - name: categoria
            label: Categoria
            type: select
            options:
              values:
                - { name: destaque, label: "Destaque (inauguração)" }
                - { name: alunos, label: Alunos }
                - { name: eventos, label: Eventos }
                - { name: aulas, label: Aulas }
                - { name: praticas, label: Práticas }
                - { name: apresentacoes, label: Apresentações }
                - { name: coreografias, label: Coreografias }
                - { name: festivais, label: Festivais }
          - name: video
            label: "É vídeo? (opcional — o site já reconhece .mp4 sozinho)"
            type: boolean
          - name: capa
            label: "Usar como capa da pasta (categoria)"
            type: boolean

  - name: mural_recados
    label: "Mural de recados"
    type: file
    path: content/mural.json
    fields:
      - name: itens
        label: Recados
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titulo}"
        fields:
          - name: imagem
            label: "Imagem / cartaz (opcional)"
            type: image
          - name: titulo
            label: Título
            type: string
          - name: data
            label: "Data / quando (texto livre)"
            type: string
          - name: categoria
            label: Categoria
            type: select
            options:
              values:
                - { name: evento, label: "Evento / chamada" }
                - { name: agenda_profes, label: "Agenda dos professores" }
                - { name: data_importante, label: "Data importante" }
                - { name: aviso, label: "Aviso geral" }
          - name: texto
            label: Texto do recado
            type: text

  - name: agenda_ano
    label: "Agenda do ano"
    type: file
    path: content/agenda_ano.json
    fields:
      - name: itens
        label: Programação
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{data} — {titulo}"
        fields:
          - name: data
            label: "Data / mês"
            type: string
          - name: titulo
            label: Título
            type: string
          - name: descricao
            label: Descrição
            type: text
          - name: imagem
            label: "Imagem / cartaz (opcional) — clique abre em tela cheia"
            type: image

  - name: agenda_fds
    label: "Agenda final de semana"
    type: file
    path: content/agenda_fds.json
    fields:
      - name: itens
        label: Eventos
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{data} — {titulo}"
        fields:
          - name: data
            label: "Quando (ex.: Sáb 22h)"
            type: string
          - name: titulo
            label: Título
            type: string
          - name: local
            label: Local
            type: string
          - name: descricao
            label: Descrição
            type: text
          - name: link
            label: "Link (opcional)"
            type: string

  - name: midia
    label: "Na mídia (links de publicações)"
    type: file
    path: content/midia.json
    fields:
      - name: itens
        label: Publicações
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titulo}"
        fields:
          - name: titulo
            label: "Título da matéria"
            type: string
          - name: veiculo
            label: "Veículo / site (ex.: Bancários Pelotas)"
            type: string
          - name: link
            label: "Link (URL completa)"
            type: string

  - name: info
    label: "Informações & Horários"
    type: file
    path: content/info.json
    fields:
      - name: logo
        label: "Logo (imagem) — aparece no topo, hero e ícone do site"
        type: image
      - name: foto_casal
        label: "Foto do casal (seção Quem somos)"
        type: image
      - name: musica
        label: "Música (arquivo .mp3) — toca no botão 'Ouça nossa música'"
        type: file
      - name: whatsapp
        label: "WhatsApp (só números, com 55)"
        type: string
      - name: whatsapp_msg
        label: "Mensagem inicial do WhatsApp"
        type: string
      - name: instagram
        label: "Link do Instagram"
        type: string
      - name: endereco
        label: "Endereço"
        type: string
      - name: hero_subtitulo
        label: "Frase de abertura"
        type: string
      - name: hero_titulo
        label: "Título principal"
        type: string
      - name: google_reviews_url
        label: "Link das avaliações Google"
        type: string
      - name: horarios
        label: "Grade de horários"
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{dia} — {hora}"
        fields:
          - name: dia
            label: Dia
            type: string
          - name: hora
            label: Horário
            type: string
          - name: nivel
            label: Nível
            type: string
          - name: descricao
            label: Descrição
            type: text
